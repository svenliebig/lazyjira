project_name: lazyjira

before:
  hooks:
    - go mod tidy

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

builds:
  - id: lazyjira
    main: .
    binary: lazyjira
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - 386
      - arm
    goarm:
      - 6
      - 7
    ignore:
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: "^feat(\\(.+\\))?:"
    - title: Fixes
      regexp: "^fix(\\(.+\\))?:"
    - title: Chore
      regexp: "^(chore|build|ci|docs|refactor|test)(\\(.+\\))?:"
  filters:
    exclude:
      - "^Merge"

brews:
  - name: lazyjira
    repository:
      owner: svenliebig
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/svenliebig/lazyjira"
    description: "A minimal Jira CLI for the terminal inspired by lazygit"
    license: "MIT"
    install: |
      bin.install "lazyjira"

release:
  footer: ""
